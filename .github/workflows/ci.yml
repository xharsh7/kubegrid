name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # lint:
  #   name: Lint
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-go@v5
  #       with:
  #         go-version: "1.25"
  #         check-latest: true
  #     - name: Install golangci-lint
  #       run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  #     - name: Run golangci-lint
  #       run: golangci-lint run --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -v -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: Build
        run: go build -ldflags="-s -w -X main.version=$(git describe --tags --always)" -o kubegrid ./cmd/kubegrid
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kubegrid-linux-amd64
          path: kubegrid
