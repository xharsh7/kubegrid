# Example kubeconfig for testing kubegrid
# Place this in ~/.kube/ directory

apiVersion: v1
kind: Config

clusters:
- cluster:
    certificate-authority-data: LS0tLS1...
    server: https://prod-cluster.example.com:6443
  name: prod-cluster

- cluster:
    certificate-authority-data: LS0tLS1...
    server: https://staging-cluster.example.com:6443
  name: staging-cluster

- cluster:
    certificate-authority-data: LS0tLS1...
    server: https://127.0.0.1:6443
  name: minikube

contexts:
- context:
    cluster: prod-cluster
    namespace: default
    user: prod-admin
  name: prod

- context:
    cluster: staging-cluster
    namespace: default
    user: staging-admin
  name: staging

- context:
    cluster: minikube
    namespace: default
    user: minikube-user
  name: minikube

current-context: minikube

users:
- name: prod-admin
  user:
    token: eyJhbGciOiJSUzI1NiIsImtpZCI6Ii...

- name: staging-admin
  user:
    token: eyJhbGciOiJSUzI1NiIsImtpZCI6Ii...

- name: minikube-user
  user:
    client-certificate: /home/user/.minikube/profiles/minikube/client.crt
    client-key: /home/user/.minikube/profiles/minikube/client.key
